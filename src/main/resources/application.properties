spring.application.name=agricul
server.port=8000

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agricul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}

# Firebase — set to true when the real service account JSON is in place
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account-path=classpath:firebase-service-account.json
